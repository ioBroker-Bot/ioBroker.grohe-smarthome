<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grohe Smarthome – Device Overview</title>
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a1929;
            --surface: #0d2137;
            --text: #ddeeff;
            --text-muted: #6b9bbf;
            --accent: #29b6f6;
            --accent-alt: #00e5ff;
            --border: #1a3a5c;
            --th-bg: #0d2a42;
            --code-bg: rgba(41,182,246,0.1);
            --dot-inactive: #2a4a66;
            --shadow: 0 2px 10px rgba(0,0,0,0.6);
            --sense-accent: #4fc3f7;
            --guard-accent: #0288d1;
            --blue-accent: #26c6da;
            --warn: #ff9800;
            --danger: #ef5350;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #e3f2fd;
                --surface: #ffffff;
                --text: #0d2137;
                --text-muted: #4a7fa0;
                --accent: #0277bd;
                --accent-alt: #006064;
                --border: #b3d9f0;
                --th-bg: #daeaf8;
                --code-bg: rgba(2,119,189,0.08);
                --dot-inactive: #90b9d4;
                --shadow: 0 1px 4px rgba(0,60,120,0.15);
                --sense-accent: #0288d1;
                --guard-accent: #01579b;
                --blue-accent: #00838f;
                --warn: #e65100;
                --danger: #c62828;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            font-size: 14px;
            min-height: 100vh;
        }
        section { margin-bottom: 28px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }
        .section-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sense-icon   { background: var(--sense-accent); }
        .guard-icon   { background: var(--guard-accent); }
        .blue-icon    { background: var(--blue-accent); }
        .card {
            background: var(--surface);
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
        }
        th {
            background: var(--th-bg);
            padding: 9px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        td {
            padding: 9px 14px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
        }
        tr:first-child td { border-top: none; }
        tr:hover td { background: rgba(41,182,246,0.04); }
        .col-status { width: 36px; text-align: center; }
        .dot {
            display: inline-block;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            vertical-align: middle;
        }
        .dot.inactive {
            background: var(--dot-inactive);
            box-shadow: none;
        }
        .value-cell { font-weight: 600; }
        .val-na { color: var(--text-muted); font-weight: normal; }
        .empty-row td {
            text-align: center;
            color: var(--text-muted);
            padding: 24px;
            font-style: italic;
        }
        #loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 16px;
        }
        #loading::after {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 16px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg {
            background: rgba(239,83,80,0.12);
            border: 1px solid rgba(239,83,80,0.4);
            color: #ef5350;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }
        #refresh-info {
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 8px;
        }
        #content { display: none; }
        #no-devices {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 14px;
            display: none;
        }
        .intro-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .intro-text {
            font-size: 14px;
            color: var(--text-muted);
            flex: 1;
            min-width: 200px;
        }
        .config-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            border-radius: 6px;
            padding: 7px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .config-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }
        /* Progress bar for CO₂ / Filter remaining */
        .progress-wrap {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-width: 90px;
        }
        .progress-track {
            flex: 1;
            height: 7px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            min-width: 50px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent);
            transition: width 0.4s;
        }
        .progress-fill.low    { background: var(--danger); }
        .progress-fill.medium { background: var(--warn); }
        .progress-label {
            font-size: 12px;
            font-weight: 600;
            min-width: 32px;
            text-align: right;
        }
        /* Valve badge */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-open   { background: rgba(41,182,246,0.15); color: var(--accent); }
        .badge-closed { background: rgba(100,150,180,0.12); color: var(--text-muted); }
        /* Device name */
        .device-name { font-weight: 600; }
        /* Watermark decoration */
        .tab-header-decoration {
            position: absolute;
            right: 20px;
            top: 14px;
            font-size: 48px;
            opacity: 0.04;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
<div id="error-msg"></div>
<div id="loading"></div>
<div id="content">
    <div class="intro-bar">
        <span id="intro-text" class="intro-text"></span>
        <button class="config-btn" id="config-btn"></button>
    </div>

    <!-- Grohe Sense -->
    <section id="sense-section" style="display:none">
        <div class="section-title">
            <span class="section-icon sense-icon"></span>
            <span id="h-sense"></span>
        </div>
        <div class="card">
            <table id="sense-table">
                <thead>
                    <tr>
                        <th class="col-status"></th>
                        <th id="th-sense-name"></th>
                        <th id="th-sense-temp"></th>
                        <th id="th-sense-hum"></th>

            </table>
        </div>
    </section>

    <!-- Grohe Sense Guard -->
    <section id="guard-section" style="display:none">
        <div class="section-title">
            <span class="section-icon guard-icon"></span>
            <span id="h-guard"></span>
        </div>

                        <th id="th-guard-name"></th>
                        <th id="th-guard-wtemp"></th>
                        <th id="th-guard-flow"></th>
                        <th id="th-guard-pres"></th>
                        <th id="th-guard-valve"></th>
                        <th id="th-guard-daily"></th>
                        <th id="th-guard-last"></th>
                    </tr>
                </thead>
                <tbody id="tbody-guard"></tbody>
            </table>
        </div>
    </section>

    <!-- Grohe Blue -->
    <section id="blue-section" style="display:none">
        <div class="section-title">
            <span class="section-icon blue-icon"></span>
            <span id="h-blue"></span>
        </div>
        <div class="card">
            <table id="blue-table">

                        <th id="th-blue-name"></th>
                        <th id="th-blue-co2"></th>
                        <th id="th-blue-filter"></th>
                        <th id="th-blue-co2l"></th>
                        <th id="th-blue-filterl"></th>
                        <th id="th-blue-last"></th>
                    </tr>
                </thead>
                <tbody id="tbody-blue"></tbody>
            </table>
        </div>
    </section>

    <div id="no-devices"></div>
    <div id="refresh-info"></div>
</div>

    var lang = (navigator.language || 'en').replace('-', '_').toLowerCase();
    /* Try full locale, then two-letter language code, then 'en' */
    var T = STRINGS[lang] || STRINGS[lang.slice(0, 2)] || STRINGS.en;

    /* ── constants ── */
    var SOCKET_TIMEOUT_MS   = 8000;
    var REFRESH_INTERVAL_MS = 5000;

    /* ── instance from URL ── */
    var params   = new URLSearchParams(window.location.search);
    var instance = parseInt(params.get('instance') || '0', 10);
    if (isNaN(instance) || instance < 0) instance = 0;
    var NS = 'grohe-smarthome.' + instance;

    /* Excluded root keys that are not devices */
    var EXCLUDED_ROOTS = ['info', 'auth'];

    /* ── socket abstraction ── */
    var _sock = null;

    function _getObject(id) {
        var ps = _sock;
        if (ps && typeof ps.getObject === 'function') return ps.getObject(id);
        return new Promise(function (res, rej) {
            ps.emit('getObject', id, function (err, obj) { err ? rej(new Error(err)) : res(obj); });
        });
    }
    function _getStates(pattern) {
        var ps = _sock;
        if (ps && typeof ps.getStates === 'function') return ps.getStates(pattern);
        return new Promise(function (res, rej) {
            ps.emit('getForeignStates', pattern, function (err, states) {
                err ? rej(new Error(err)) : res(states || {});
            });
        });
    }

    function initSocket() {
        /* Strategy 1 – reuse parent admin socket (admin v7+) */
        try {
            var ps = window.parent && window.parent !== window && window.parent.socket;
            if (ps && (typeof ps.getObject === 'function' || typeof ps.emit === 'function')) {
                _sock = ps;
                return Promise.resolve();
            }
        } catch (_) { /* cross-origin – ignore */ }

        /* Strategy 2 – create a fresh socket.io connection */
        if (typeof io === 'undefined') {
            return Promise.reject(new Error(T.noConn));
        }
        return new Promise(function (resolve, reject) {
            try {
                var s = io.connect();
                var addListener = typeof s.once === 'function' ? s.once.bind(s)
                                : typeof s.on   === 'function' ? s.on.bind(s)
                                : null;
                if (!addListener) { return reject(new Error(T.noConn)); }
                if (s.connected) { _sock = s; return resolve(); }
                var done = false;
                addListener('connect', function () {
                    if (done) return; done = true; _sock = s; resolve();
                });
                addListener('connect_error', function (e) {
                    if (done) return; done = true; reject(e);
                });
                setTimeout(function () {
                    if (!done) { done = true; reject(new Error('Socket timeout')); }
                }, SOCKET_TIMEOUT_MS);
            } catch (e) { reject(e); }
        });
    }

    /* ── helpers ── */
    function el(tag, opts) {
        var e = document.createElement(tag);
        if (opts) {
            if (opts.text  !== undefined) e.textContent = opts.text;
            if (opts.html  !== undefined) e.innerHTML   = opts.html;
            if (opts.cls)  e.className   = opts.cls;
            if (opts.title) e.title      = opts.title;
        }
        return e;
    }
    function setText(id, txt) {
        var node = document.getElementById(id);
        if (node) node.textContent = txt;
    }
    function getVal(states, key) {
        var s = states[key];
        if (!s) return null;
        if (s.val === null || s.val === undefined) return null;
        return s.val;
    }
    function fmtNum(val, decimals, unit) {
        if (val === null || val === undefined) return T.na;
        var n = parseFloat(val);
        if (isNaN(n)) return T.na;
        return n.toFixed(decimals) + '\u202f' + unit;
    }
    function fmtDate(val) {
        if (!val) return T.na;
        try {
            var d = new Date(val);
            if (isNaN(d.getTime())) return String(val);
            return d.toLocaleString();
        } catch (_) { return String(val); }
    }
    function makeProgressBar(val) {
        var pct = Math.max(0, Math.min(100, parseFloat(val) || 0));
        var cls = pct < 20 ? 'low' : pct < 50 ? 'medium' : '';
        var colorStyle = pct < 20 ? 'background:var(--danger)' : pct < 50 ? 'background:var(--warn)' : '';
        return '<div class="progress-wrap">' +
            '<div class="progress-track">' +
            '<div class="progress-fill ' + cls + '" style="width:' + pct.toFixed(0) + '%;' + colorStyle + '"></div>' +
            '</div>' +
            '<span class="progress-label">' + pct.toFixed(0) + '\u202f%</span>' +
            '</div>';
    }
    function makeValveBadge(isOpen) {
        if (isOpen === null || isOpen === undefined) return '<span style="color:var(--text-muted)">' + T.na + '</span>';
        if (isOpen) return '<span class="badge badge-open">' + T.valveOpen + '</span>';
        return '<span class="badge badge-closed">' + T.valveClosed + '</span>';
    }
    function makeDot(online) {
        var active = (online === true || online === 'true');
        return '<span class="dot' + (active ? '' : ' inactive') + '" title="' +
            (active ? T.online : T.offline) + '"></span>';
    }

    /* ── device extraction ── */
    function extractDevices(states) {
        var devices = {};
        var prefix  = NS + '.';
        Object.keys(states).forEach(function (stateId) {
            if (stateId.indexOf(prefix) !== 0) return;
            var rest  = stateId.slice(prefix.length);
            var parts = rest.split('.');
            if (parts.length < 2) return;
            var uuid = parts[0];
            if (EXCLUDED_ROOTS.indexOf(uuid) !== -1) return;
            if (!devices[uuid]) {
                devices[uuid] = { uuid: uuid, name: uuid, type: null, states: {} };
            }
            var statePath = parts.slice(1).join('.');
            devices[uuid].states[statePath] = states[stateId];
        });

        /* Detect device type from available state keys */
        Object.keys(devices).forEach(function (uuid) {
            var s = devices[uuid].states;
            if ('humidity' in s) {
                devices[uuid].type = 'SENSE';
            } else if ('flowRate' in s) {
                devices[uuid].type = 'SENSE_GUARD';
            } else if ('remainingCo2' in s || 'remainingFilter' in s) {
                devices[uuid].type = 'BLUE';
            }
        });

        return devices;
    }

    function render(devices) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        setText('intro-text', T.intro);
        setText('config-btn', T.configBtn);

        var sense = [], guard = [], blue = [];
        Object.keys(devices).forEach(function (uuid) {
            var d = devices[uuid];
            if      (d.type === 'SENSE')       sense.push(d);
            else if (d.type === 'SENSE_GUARD')  guard.push(d);
            else if (d.type === 'BLUE')         blue.push(d);
        });

        /* Sort by name within each group */
        function byName(a, b) { return a.name < b.name ? -1 : a.name > b.name ? 1 : 0; }
        sense.sort(byName); guard.sort(byName); blue.sort(byName);

        /* Sense section */
        setText('h-sense', T.hSense);
        if (sense.length > 0) {
            setTableHeaders('SENSE');
            document.getElementById('sense-section').style.display = 'block';
            var tbodySense = document.getElementById('tbody-sense');
            tbodySense.innerHTML = '';
            sense.forEach(function (d) { renderSenseRow(tbodySense, d); });
        } else {
            document.getElementById('sense-section').style.display = 'none';
        }

        /* Sense Guard section */
        setText('h-guard', T.hGuard);
        if (guard.length > 0) {
            setTableHeaders('SENSE_GUARD');
            document.getElementById('guard-section').style.display = 'block';
            var tbodyGuard = document.getElementById('tbody-guard');
            tbodyGuard.innerHTML = '';
            guard.forEach(function (d) { renderGuardRow(tbodyGuard, d); });
        } else {
            document.getElementById('guard-section').style.display = 'none';
        }

        /* Blue section */
        setText('h-blue', T.hBlue);
        if (blue.length > 0) {
            setTableHeaders('BLUE');
            document.getElementById('blue-section').style.display = 'block';
            var tbodyBlue = document.getElementById('tbody-blue');
            tbodyBlue.innerHTML = '';
            blue.forEach(function (d) { renderBlueRow(tbodyBlue, d); });
        } else {
            document.getElementById('blue-section').style.display = 'none';
        }

        /* No devices message */
        var noDiv = document.getElementById('no-devices');
        if (!sense.length && !guard.length && !blue.length) {
            noDiv.textContent = T.noDevices;
            noDiv.style.display = 'block';
        } else {
            noDiv.style.display = 'none';
        }

        document.getElementById('refresh-info').textContent =
            T.refreshed + new Date().toLocaleTimeString();
    }

    function showError(msg) {
        var e = document.getElementById('error-msg');
        e.textContent = T.error + msg;
        e.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
    }

    /* ── config navigation ── */
    function openConfig() {
        var hash = 'tab-instances/config/system.adapter.' + NS;
        try {
            var target = (window.parent && window.parent !== window) ? window.parent : window;
            var base   = target.location.href.split('#')[0];
            target.location.href = base + '#' + hash;
        } catch (_) {
            window.open('/index.html#' + hash, '_blank');
        }
    }
    document.getElementById('config-btn').addEventListener('click', openConfig);

    /* ── load ── */
    function load() {
        _getStates(NS + '.*')
            .then(function (states) {
                if (!states || Object.keys(states).length === 0) {
                    render({});
                    return;
                }
                var devices = extractDevices(states);
                var uuids   = Object.keys(devices);
                if (!uuids.length) {
                    render({});
                    return;
                }
                /* Fetch channel objects for human-readable device names */
                return Promise.all(uuids.map(function (uuid) {
                    return _getObject(NS + '.' + uuid)
                        .then(function (obj) {
                            if (obj && obj.common) {
                                var n = obj.common.name;
                                if (n && typeof n === 'object') {
                                    /* multilingual name object */
                                    var lk = lang.slice(0, 2);
                                    n = n[lk] || n.en || n.de || Object.values(n)[0] || uuid;
                                }
                                if (n) devices[uuid].name = String(n);
                            }
                        })
                        .catch(function () { /* keep UUID as name */ });
                })).then(function () {
                    render(devices);
                });
            })
            .catch(function (err) {
                showError(err && err.message ? err.message : String(err));
            });
    }

    /* ── init ── */
    document.getElementById('loading').textContent = T.loading;

    initSocket()
        .then(function () {
            load();
            setInterval(load, REFRESH_INTERVAL_MS);
        })
        .catch(function (err) {
            showError(err && err.message ? err.message : T.noConn);
        });
}());
</script>
</body>
</html>
